[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"

solc_version = "0.8.26"

# REQUIRED: ArbiSmartV2.getUserStatsExtended triggers "Stack too deep" under
# the legacy (non-IR) codegen pipeline. This was verified directly with
# solc 0.8.26: compilation fails without via_ir and succeeds with it,
# producing 0 errors and 0 warnings.
via_ir = true

optimizer = true
optimizer_runs = 200

# Polygon mainnet has been on an EVM-equivalent-to-Cancun fork since well
# before this project's deployment date; solc 0.8.26's default target
# (Cancun) is compatible. If you are deploying to an older/forked network
# that lacks TSTORE/MCOPY/PUSH0, override this explicitly.
# evm_version = "cancun"

fs_permissions = [{ access = "read", path = "./" }]

gas_reports = ["ArbiSmartV2"]

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"

# Forge's unified verifier config. Polygonscan is accessed through the
# Etherscan-compatible v2 API; the same [etherscan] table is used for all
# Etherscan-family explorers, keyed by the rpc_endpoints alias.
[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137, url = "https://api.polygonscan.com/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
