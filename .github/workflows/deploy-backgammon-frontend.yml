name: Deploy Backgammon frontend to GitHub Pages

on:
  push:
    branches: [main, claude/new-project-github-0jygnc]
    paths:
      - "backgammon/frontend/**"
      - ".github/workflows/deploy-backgammon-frontend.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backgammon/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backgammon/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_CORE_ADDRESS_TESTNET: ${{ secrets.VITE_CORE_ADDRESS_TESTNET }}
          VITE_CORE_ADDRESS_MAINNET: ${{ secrets.VITE_CORE_ADDRESS_MAINNET }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: backgammon/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
